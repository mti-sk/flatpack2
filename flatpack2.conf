# flatpack2.conf - Configuration file for flatpack2 v2.9.0
# ------------------------------------------------------------

[can]
# Serial port of Waveshare USB-CAN-A adapter
# If autodetect = true, this is tried first, then auto-detection
channel = /dev/ttyUSB0
# CAN bus speed (Flatpack2 requires 125000)
bitrate = 125000
# Serial baudrate of Waveshare adapter (default 2000000)
serial_baudrate = 2000000
# Autodetect Waveshare adapter by USB VID:PID (1a86:7523 = CH341)
autodetect = true

[logging]
logfile = /var/log/flatpack2.log
loglevel = DEBUG
# Log rotation: max file size in bytes (10MB default)
max_bytes = 10485760
# Number of backup log files to keep
backup_count = 5

[watchdog]
# Enable CAN communication watchdog
enabled = true
# Seconds without STATUS packet before reconnect is triggered
timeout = 30

[daemon]
# Run as background daemon
enabled = false
pidfile = /var/run/flatpack2.pid
# User and group to run as (leave empty to keep current user)
user =
group =

[terminal]
# Terminal type: pty (virtual TTY) or stdio (direct console)
type = pty
# Symlink to PTY slave device (connect via: screen /tmp/flatpack2.pty)
pty_symlink = /tmp/flatpack2.pty

[psu]
# Over-voltage protection - must be higher than any configured voltage
ovp_voltage = 60.0
# Seconds to wait for PSU discovery on startup
discovery_timeout = 10

# ------------------------------------------------------------
# Per-PSU configuration sections
# Format: [PSU_<id>] where id matches program-assigned ID
#
# serial        - PSU serial number (hex) for deterministic mapping
#                 If omitted, mapping is by discovery order
# voltage       - Target output voltage in Volts
# current       - Target output current in Amps
# apply_on_start - Apply voltage/current settings on startup
#                  Program waits for stable status before applying
# ------------------------------------------------------------

[PSU_1]
serial = 174431050522
voltage = 54.0
current = 20.0
apply_on_start = true

# Example second PSU (uncomment and fill serial when available):
#[PSU_2]
#serial =
#voltage = 48.0
#current = 15.0
#apply_on_start = false

# ------------------------------------------------------------
# Charger configuration (LiFePO4 CC/CV)
# Uncomment and configure to enable charger mode
# ------------------------------------------------------------

#[charger]
## Number of LiFePO4 cells in series
#cell_count = 16
## Maximum cell voltage (CV phase target)
#cell_voltage_max = 3.65
## Battery capacity in Ah (for reference only)
#capacity = 100
## Default charge current in A (CC phase), can be overridden via CLI
#charge_current = 20.0
## Tail current in A - end of charge detection
#charge_current_tail = 2.0
## Safety time limit in minutes (10h = 600 min)
#safety_time_limit = 600
## Minimum current to detect connected battery (A)
#min_current_detect = 0.5
## Starting current during battery detection phase (A)
## PSU holds target voltage at this current until battery is detected
#start_current = 5.0
## Delay between battery detection checks (seconds)
#battery_detect_delay = 5
## Voltage tolerance for CC->CV transition (V)
#voltage_tolerance = 0.1
## Status monitor refresh interval (seconds)
#monitor_interval = 5.0


# ------------------------------------------------------------
# Web-GUI configuration (Flask dashboard)
# ------------------------------------------------------------

[webgui]
# Enable web dashboard
enabled = true
# Bind address (0.0.0.0 = all interfaces, 127.0.0.1 = localhost only)
host = 0.0.0.0
# TCP port
port = 8080
# Log HTTP access to logfile (method + path + status only)
log_access = true
