# flatpack2_charger.conf - Configuration file for flatpack2 v3.0.2
# ------------------------------------------------------------

[can]
# Serial port of Waveshare USB-CAN-A adapter
# If autodetect = true, this is tried first, then auto-detection
channel = /dev/ttyUSB0
# CAN bus speed (Flatpack2 requires 125000)
bitrate = 125000
# Serial baudrate of Waveshare adapter (default 2000000)
serial_baudrate = 2000000
# Autodetect Waveshare adapter by USB VID:PID (1a86:7523 = CH341)
autodetect = true

[logging]
logfile = /var/log/flatpack2.log
loglevel = DEBUG
# Log rotation: max file size in bytes (10MB default)
max_bytes = 10485760
# Number of backup log files to keep
backup_count = 5

[watchdog]
# Enable CAN communication watchdog
enabled = true
# Seconds without STATUS packet before reconnect is triggered
timeout = 30

[daemon]
# Run as background daemon
enabled = false
pidfile = /var/run/flatpack2.pid
# User and group to run as (leave empty to keep current user)
user =
group =

[terminal]
# Terminal type: pty (virtual TTY) or stdio (direct console)
type = pty
# Symlink to PTY slave device (connect via: screen /tmp/flatpack2.pty)
pty_symlink = /tmp/flatpack2.pty

[psu]
# Over-voltage protection - must be higher than any configured voltage
ovp_voltage = 60.0
# Seconds to wait for PSU discovery on startup
discovery_timeout = 10
# Power variant of the PSU module (W). Eltek Flatpack2 48V is produced in
# several power variants; the CAN protocol and voltage range (43.5-57.6V)
# are identical, only the max current/power differs. This value derives the
# enforced current/power limits (I_MAX = power_rating / 48.0V nominal):
#   1800 -> I_MAX ~ 37.5 A
#   2000 -> I_MAX ~ 41.7 A  (default, standard "2000W HE" variant)
#   3000 -> I_MAX ~ 62.5 A
power_rating = 2000

# ------------------------------------------------------------
# Per-PSU configuration sections
# Format: [PSU_<id>] where id matches program-assigned ID
#
# serial         - PSU serial number (hex) for deterministic mapping
#                  If omitted, mapping is by discovery order
# voltage        - Target output voltage in Volts
# current        - Target output current in Amps
# apply_on_start - Apply voltage/current settings on startup
#                  Program waits for stable status before applying
#                  NOTE: when charger auto_start = true, charger
#                  takes over and PSU_x apply_on_start is ignored
# ------------------------------------------------------------

[PSU_1]
serial = 173350049492
voltage = 54.0
current = 20.0
apply_on_start = true

# Example second PSU (uncomment and fill serial when available):
#[PSU_2]
#serial =
#voltage = 48.0
#current = 15.0
#apply_on_start = false

# ------------------------------------------------------------
# Charger configuration (LiFePO4 CC/CV)
# Uncomment and configure to enable charger mode
# ------------------------------------------------------------

[charger]
# Number of LiFePO4 cells in series
cell_count = 16
# Maximum cell voltage (CV phase) - limited by PSU to 57.6V / 16 = 3.60V
cell_voltage_max = 3.60
# Battery capacity in Ah (informational)
capacity = 400
# Charge current in CC phase [A]
charge_current = 35.0
# Tail current - end-of-charge detection [A] (1% of capacity)
charge_current_tail = 4.0
# Safety time limit [min] (20 h) - counted from start of RAMP phase
safety_time_limit = 1200

# --- Battery detection (DETECT phase) ---
# PSU output voltage during DETECT phase [V]
# Must be high enough to be above a deeply discharged battery, but low enough
# not to cause inrush current if battery is already near this voltage.
# Note: valid range is PSU_V_MIN (43.5V) to PSU_V_MAX (57.6V).
# Default 48.0V is a good starting point for 16S LiFePO4 (min ~44V at 0% SOC).
detect_voltage = 48.0
# PSU current limit during DETECT phase [A]
# Very low - only enough to hold the voltage setpoint; no real current flows
# until battery is detected.
detect_current = 0.2
# Battery detection threshold [V]
# Battery is considered detected when: vout > detect_voltage + detect_threshold
# This margin avoids false detection from noise or capacitor settling.
detect_threshold = 1.0
# Minimum current to confirm battery is actively accepting charge [A]
# Used as secondary confirmation after voltage-based detection.
# Also used as the "current collapsed" threshold for battery-disconnect
# detection in the CC/CV phases.
min_current_detect = 0.5
# Battery-disconnect confirmation time in CC phase [s]
# If Iout stays below min_current_detect for this long during CC, the battery
# is considered disconnected and the charger returns to the DETECT phase.
# Prevents a single noisy sample from triggering a false disconnect.
disconnect_detect_time = 5.0

# --- Soft-start ramp (RAMP phase) ---
# Voltage step per ramp interval [V]
# Small steps avoid inrush current spikes.
ramp_step_voltage = 0.1
# Time between ramp steps [s]
# 0.1V / 5s = worst case ~5.5 min ramp from 51V to 57.6V
ramp_step_interval = 5.0

# --- Regulation ---
# Voltage tolerance for CC->CV transition [V]
voltage_tolerance = 0.1
# Monitor interval [s]
monitor_interval = 5.0
# Automatic charging start on program startup and after CAN bus reconnect
# true  = charging starts automatically (default)
# false = charging must be started manually (CLI: charge start / Web: Start)
auto_start = true

# ------------------------------------------------------------
# Web-GUI configuration (Flask dashboard)
# ------------------------------------------------------------

[webgui]
# Enable web dashboard
enabled = true
# Bind address (0.0.0.0 = all interfaces, 127.0.0.1 = localhost only)
host = 0.0.0.0
# TCP port
port = 8080
# Log HTTP access to logfile (method + path + status only)
log_access = true
# SSE update interval [s] - how often the dashboard refreshes live data
sse_interval = 3

# ------------------------------------------------------------
# History persistence (CSV)
# Graphs survive a program restart: on startup the last 12 h are
# loaded back into RAM from the CSV file.
# ------------------------------------------------------------

[history]
# Enable CSV persistence of the measurement history
persist = true
# CSV file path (columns: timestamp_ms,vout,iout,ah,wh)
file = /var/log/flatpack2_history.csv
# Buffered write interval [s] - rows are appended in batches to spare
# SD/flash media
flush_interval = 60
# Rows older than this many days are dropped from the file at startup
retention_days = 30
